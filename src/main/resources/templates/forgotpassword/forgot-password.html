<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/header :: head}"></th:block>
    <title>Forgot Password - Matrimony</title>
    <link rel="icon" type="image/png" th:href="@{/images/logo_1.png}">
    <link rel="stylesheet" th:href="@{/css/fp.css}">
</head>

<body>
<th:block th:replace="~{fragments/header :: navbar}"></th:block>

<div class="fp-container">
    <div class="fp-box">

        <div class="fp-header">
            <div class="fp-icon">🔐</div>
            <h2>Forgot Password?</h2>
            <p>Enter your registered email address and we'll send you a link to reset your password.</p>
        </div>

        <div id="alertContainer">
            <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
            <div class="alert alert-error"   th:if="${error}"   th:text="${error}"></div>
        </div>

        <form id="fpForm" method="post" th:action="@{/forgot-password}">

            <div class="fp-input-group">
                <label for="email">📧 Email Address</label>
                <input type="email"
                       id="email"
                       name="email"
                       placeholder="Enter your registered email"
                       required
                       autofocus
                       autocomplete="email">
                <div class="help-text">We'll send a reset link to this email</div>
            </div>

            <button type="submit" class="btn-fp" id="submitBtn">
                Send Reset Link
            </button>
        </form>

        <div class="fp-footer-links">
            <a th:href="@{/login}">← Back to Login</a>
            <span class="dot">•</span>
            <a th:href="@{/register}">Create Account</a>
        </div>

    </div>
</div>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<script>
    document.getElementById('fpForm')?.addEventListener('submit', function () {
        const btn = document.getElementById('submitBtn');
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Sending...';
        }
    });
</script>
</body>
</html>
