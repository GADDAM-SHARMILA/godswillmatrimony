<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{fragments/header :: head}"></th:block>
    <title>My Shortlist - Matrimony</title>
    <link rel="stylesheet" th:href="@{/css/shortlist.css}">
    <link rel="icon" type="image/png" th:href="@{/images/logo_1.png}">
</head>
<style>
    .profile-card-image { position: relative; }
    .profile-card-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85%;
      height: 85%;
      object-fit: contain;
      border-radius: 50%;
      border: 4px solid #f2b8cc;
      z-index: 5;
      pointer-events: none;
      opacity: 0.18;
      background: transparent;
    }
</style>
<body th:attr="data-logged-in=${session.user != null}">
<!-- Header -->
<th:block th:replace="~{fragments/header :: navbar}"></th:block>

<div class="shortlist-container">
    <div class="container">
        <!-- Header Section -->
        <div class="shortlist-header">
            <h1><i class="fas fa-heart"></i> My Shortlist</h1>
            <p class="shortlist-count">
                You have <strong th:text="${totalItems}">0</strong> shortlisted profiles
            </p>
        </div>

        <!-- Empty State -->
        <div th:if="${#lists.isEmpty(shortlistedProfiles)}" class="empty-shortlist">
            <i class="fas fa-heart-broken"></i>
            <h2>No Profiles Shortlisted Yet</h2>
            <p>Start exploring and shortlist your favorite profiles!</p>
            <a href="/profiles" class="btn btn-primary" style="display: inline-block; padding: 12px 30px;">
                <i class="fas fa-search"></i> Browse Profiles
            </a>
        </div>

        <!-- Profiles Grid -->
        <div th:if="${!#lists.isEmpty(shortlistedProfiles)}">
            <div class="profile-grid">
                <div class="profile-card" th:each="profile : ${shortlistedProfiles}">
                    <!-- Profile Image -->
                    <div class="profile-card-image">
                        <img th:src="${#strings.isEmpty(profile.imageUrl)} ? @{/images/default-avatar.jpg} : ${profile.imageUrl}"
                             th:alt="|${#strings.capitalize(profile.firstName)} ${#strings.capitalize(profile.lastName)}|"
                             loading="lazy">
                        <img th:src="@{/images/logo_1.png}"
                             alt="GVM"
                             class="profile-card-logo"
                             style="background:transparent;">

                        <!-- Verified Badge -->
                        <div class="profile-verified" th:if="${profile.verified}">
                            <span class="verified-badge">Verified</span>
                        </div>

                        <!-- Remove Button -->
                        <button class="remove-from-shortlist btn-remove-shortlist"
                                type="button"
                                th:attr="data-profile-id=${profile.id}"
                                title="Remove from shortlist">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>

                    <!-- Profile Content -->
                    <div class="profile-card-content">
                        <h3 th:text="|${#strings.capitalize(profile.firstName)} ${#strings.capitalize(profile.lastName)}, ${profile.calculatedAge}|">
                            Name, 28
                        </h3>

                        <div class="profile-info">
                            <div class="profile-info-item" th:if="${profile.religion}" th:text="${#strings.capitalizeWords(profile.religion)}">
                                Religion
                            </div>
                            <div class="profile-info-item" th:text="|${#strings.capitalize(profile.city)}, ${#strings.capitalize(profile.state)}|">
                                City, State
                            </div>
                            <div class="profile-info-item" th:if="${profile.education}" th:text="${#strings.capitalizeWords(profile.education)}">
                                Education
                            </div>
                            <div class="profile-info-item" th:if="${profile.profession}" th:text="${#strings.capitalizeWords(profile.profession)}">
                                Profession
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="profile-card-actions">
                            <a th:href="@{/profile/{id}(id=${profile.id})}"
                               class="btn btn-primary">
                                <i class="fas fa-eye"></i> View
                            </a>
                            <button class="btn btn-outline btn-contact"
                                    type="button"
                                    th:attr="data-profile-id=${profile.id}">
                                <i class="fas fa-phone"></i> Contact
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pagination -->
            <div class="pagination-container" th:if="${totalPages > 1}">
                <a th:if="${hasPrevious}"
                   th:href="@{/shortlist(page=${currentPage - 1})}"
                   class="pagination-btn">
                    <i class="fas fa-chevron-left"></i> Previous
                </a>

                <span class="pagination-info">
                    Page <strong th:text="${currentPage + 1}">1</strong> of <strong th:text="${totalPages}">5</strong>
                </span>

                <a th:if="${hasNext}"
                   th:href="@{/shortlist(page=${currentPage + 1})}"
                   class="pagination-btn">
                    Next <i class="fas fa-chevron-right"></i>
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const removeButtons = document.querySelectorAll(".btn-remove-shortlist");
        const contactButtons = document.querySelectorAll(".btn-contact");

        // Handle remove from shortlist
        removeButtons.forEach(btn => {
            btn.addEventListener("click", function (e) {
                e.preventDefault();
                const profileId = this.getAttribute("data-profile-id");
                removeFromShortlist(profileId, this);
            });
        });

        // Handle contact button
        contactButtons.forEach(btn => {
            btn.addEventListener("click", function () {
                const profileId = this.getAttribute("data-profile-id");
                // Redirect to profile page with contact modal
                window.location.href = `/profile/${profileId}#contact-section`;
            });
        });
    });

    function removeFromShortlist(profileId, buttonElement) {
        if (confirm("Are you sure you want to remove this profile from your shortlist?")) {
            const card = buttonElement.closest(".profile-card");
            buttonElement.disabled = true;
            buttonElement.innerHTML = '<div class="loading"></div>';

            fetch(`/api/shortlist/toggle/${profileId}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRF-Token": getCsrfToken()
                }
            })
            .then(response => {
                if (!response.ok) throw new Error("Failed to remove from shortlist");
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    // Fade out and remove card
                    card.style.animation = "fadeOut 0.3s ease-out";
                    setTimeout(() => {
                        card.remove();
                        checkIfEmpty();
                    }, 300);
                    showNotification("Removed from shortlist", "info");
                }
            })
            .catch(error => {
                console.error("Error:", error);
                buttonElement.disabled = false;
                buttonElement.innerHTML = '<i class="fas fa-times"></i>';
                showNotification(error.message, "error");
            });
        }
    }

    function checkIfEmpty() {
        const cards = document.querySelectorAll(".profile-card");
        if (cards.length === 0) {
            location.reload();
        }
    }

    function getCsrfToken() {
        const token = document.querySelector("meta[name='_csrf']");
        return token ? token.getAttribute("content") : "";
    }

    function showNotification(message, type = "info") {
        const notification = document.createElement("div");
        notification.className = `notification notification-${type}`;
        notification.textContent = message;

        notification.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 10000;
            animation: slideIn 0.3s ease-in-out;
        `;

        const colors = {
            success: "#28a745",
            error: "#dc3545",
            info: "#17a2b8"
        };

        notification.style.backgroundColor = colors[type] || colors.info;
        document.body.appendChild(notification);

        setTimeout(() => {
            notification.style.animation = "slideOut 0.3s ease-in-out";
            setTimeout(() => notification.remove(), 300);
        }, 3000);
    }

    // Add CSS animations
    const style = document.createElement("style");
    style.textContent = `
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(400px); opacity: 0; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    `;
    document.head.appendChild(style);
</script>

</body>
</html>
