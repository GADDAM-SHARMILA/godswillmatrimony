<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/header :: head}"></th:block>
    <title>Reset Password - Matrimony</title>
    <link rel="icon" type="image/png" th:href="@{/images/logo_1.png}">
    <link rel="stylesheet" th:href="@{/css/fp.css}">
</head>

<body>
<th:block th:replace="~{fragments/header :: navbar}"></th:block>

<div class="fp-container">
    <div class="fp-box">

        <div class="fp-header">
            <div class="fp-icon">🔑</div>
            <h2>Reset Your Password</h2>
            <p>Choose a strong new password for your account.</p>
        </div>

        <div id="alertContainer">
            <div class="alert alert-error"   th:if="${error}"   th:text="${error}"></div>
            <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
        </div>

        <form id="resetForm"
              method="post"
              th:action="@{/reset-password}">

            <input type="hidden" name="token" th:value="${token}">

            <div class="fp-input-group">
                <label for="password">🔒 New Password</label>
                <div class="password-wrapper">
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Enter new password"
                           minlength="8"
                           required
                           autofocus
                           autocomplete="new-password">
                    <button type="button" class="toggle-pw" onclick="togglePassword('password')">👁</button>
                </div>
                <div class="help-text">Minimum 8 characters</div>
            </div>

            <div class="fp-input-group">
                <label for="confirmPassword">🔒 Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password"
                           id="confirmPassword"
                           name="confirmPassword"
                           placeholder="Re-enter new password"
                           minlength="8"
                           required
                           autocomplete="new-password">
                    <button type="button" class="toggle-pw" onclick="togglePassword('confirmPassword')">👁</button>
                </div>
            </div>

            <!-- Password strength bar -->
            <div class="strength-bar-wrap">
                <div class="strength-bar" id="strengthBar"></div>
            </div>
            <div class="strength-label" id="strengthLabel"></div>

            <button type="submit" class="btn-fp" id="submitBtn">
                Reset Password
            </button>
        </form>

        <div class="fp-footer-links">
            <a th:href="@{/login}">← Back to Login</a>
        </div>

    </div>
</div>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<script>
    function togglePassword(id) {
        const input = document.getElementById(id);
        if (input) input.type = input.type === 'password' ? 'text' : 'password';
    }

    // Password strength meter
    const passwordInput = document.getElementById('password');
    if (passwordInput) {
        passwordInput.addEventListener('input', function () {
            const val = this.value;
            const bar = document.getElementById('strengthBar');
            const label = document.getElementById('strengthLabel');
            if (!bar || !label) return;

            let strength = 0;
            if (val.length >= 8)                        strength++;
            if (/[A-Z]/.test(val))                      strength++;
            if (/[0-9]/.test(val))                      strength++;
            if (/[^A-Za-z0-9]/.test(val))               strength++;

            const levels = [
                { width: '0%',   color: 'transparent', text: '' },
                { width: '25%',  color: '#e74c3c',      text: 'Weak' },
                { width: '50%',  color: '#e67e22',      text: 'Fair' },
                { width: '75%',  color: '#f1c40f',      text: 'Good' },
                { width: '100%', color: '#27ae60',      text: 'Strong' },
            ];

            bar.style.width = levels[strength].width;
            bar.style.background = levels[strength].color;
            label.textContent = levels[strength].text;
            label.style.color = levels[strength].color;
        });
    }

    // Confirm match check
    document.getElementById('resetForm')?.addEventListener('submit', function (e) {
        const pw  = document.getElementById('password')?.value;
        const cpw = document.getElementById('confirmPassword')?.value;

        if (pw !== cpw) {
            e.preventDefault();
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = '<div class="alert alert-error">Passwords do not match.</div>';
            alertContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
        }

        const btn = document.getElementById('submitBtn');
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Resetting...';
        }
    });
</script>
</body>
</html>
