# =====================================================
# MongoDB Configuration
# =====================================================
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.connection-pool.max-size=50
spring.data.mongodb.connection-pool.min-size=5

# =====================================================
# Static Resources Configuration
# =====================================================
spring.web.resources.chain.cache=true
spring.web.resources.chain.gzip=true
spring.web.resources.cache.period=604800
spring.web.resources.cache.cachecontrol.max-age=604800
spring.web.resources.cache.cachecontrol.cache-public=true

# =====================================================
# Response Compression
# =====================================================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# =====================================================
# Zoho ZeptoMail Configuration
# =====================================================
zoho.zeptomail.api-key=${ZOHO_API_KEY}
zoho.zeptomail.api-url=https://api.zeptomail.in/v1.1/email/template
zoho.zeptomail.from-email=admin@godswillmatrimony.in
zoho.zeptomail.from-name=God's Will Matrimony

# ZeptoMail Template Keys
zoho.zeptomail.otp-template-key=${ZOHO_OTP_TEMPLATE_KEY}
zoho.zeptomail.welcome-template-key=${ZOHO_WELCOME_TEMPLATE_KEY}
zoho.zeptomail.reset-template-key=${ZOHO_RESET_TEMPLATE_KEY}
zoho.zeptomail.payment-template-key=${ZOHO_PAYMENT_TEMPLATE_KEY}
zoho.zeptomail.admin-welcome-template-key=${ZOHO_ADMIN_WELCOME_TEMPLATE_KEY}

# =====================================================
# Async Configuration
# =====================================================
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=200

# =====================================================
# Logging Configuration
# =====================================================
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.com.godswill.matrimony.service=DEBUG
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.mongodb.driver.protocol.command=INFO

# =====================================================
# File Upload Configuration
# =====================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.file-size-threshold=2KB
server.tomcat.max-part-count=500
app.upload.dir=${APP_UPLOAD_DIR:uploads}

# =====================================================
# Razorpay Configuration
# =====================================================
razorpay.api.key=${RAZORPAY_API_KEY}
razorpay.api.secret=${RAZORPAY_API_SECRET}

# =====================================================
# Thymeleaf & DevTools
# =====================================================
spring.thymeleaf.cache=false
spring.devtools.restart.enabled=false
spring.main.lazy-initialization=true
spring.main.banner-mode=off
spring.jackson.serialization.write-dates-as-timestamps=false

# =====================================================
# Spring Security
# =====================================================
spring.security.user.name=disabled
spring.security.user.password=disabled

# =====================================================
# AWS S3 Configuration
# =====================================================
aws.s3.access-key=${AWS_S3_ACCESS_KEY}
aws.s3.secret-key=${AWS_S3_SECRET_KEY}
aws.s3.bucket=godswill-images
aws.s3.region=ap-south-2
aws.s3.base-url=https://godswill-images.s3.ap-south-2.amazonaws.com

# =====================================================
# CloudFront CDN Configuration
# =====================================================
cloudfront.domain=drmntqprsht6q.cloudfront.net
cloudfront.enabled=true
cloudfront.cache-ttl=86400
